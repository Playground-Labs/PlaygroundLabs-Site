<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Playground Labs — coming soon</title>
  <meta name="description" content="Playground Labs is a small studio building its own apps. The site is on its way." />

  <!--
    ponytail: zero-build coming-soon placeholder. Same setup as the full site.
    The finished landing page lives in home.html; promote it back to index.html at go-live.
    Production upgrade when LCP matters: swap the Tailwind Play CDN for a purged
    `npx @tailwindcss/cli` build and self-host the fonts.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          colors: {
            accent: { DEFAULT: '#2D5BFF', ink: '#1E3FCC' },
          },
        },
      },
    };
  </script>

  <style>
    @media (prefers-reduced-motion: no-preference) {
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50%      { transform: translateY(-12px) rotate(1deg); }
      }
      .anim-float { animation: float 6s ease-in-out infinite; }

      @keyframes loadFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
      .load-fade { opacity: 0; animation: loadFade .7s cubic-bezier(.16,1,.3,1) forwards; }
      .load-fade.d1 { animation-delay: .08s; }
      .load-fade.d2 { animation-delay: .16s; }
      .load-fade.d3 { animation-delay: .24s; }
    }
    @media (prefers-reduced-motion: reduce) {
      .load-fade { opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans antialiased selection:bg-accent selection:text-white">

  <!-- logo mark: swing set in a ring, inline SVG, currentColor (inverts in dark) -->
  <svg width="0" height="0" class="hidden" aria-hidden="true">
    <symbol id="pl-logo" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="60" cy="60" r="53" stroke-width="5" />
      <path d="M27 42 L99 33" stroke-width="7" />
      <path d="M34 40 L24 92" stroke-width="7" />
      <path d="M34 40 L44 92" stroke-width="7" />
      <path d="M86 38 L76 92" stroke-width="7" />
      <path d="M86 38 L96 92" stroke-width="7" />
      <path d="M52 40 L50 74" stroke-width="5" />
      <path d="M64 38 L66 73" stroke-width="5" />
      <path d="M47 76 L69 72" stroke-width="7" />
    </symbol>
  </svg>

  <main class="relative flex min-h-[100dvh] flex-col items-center justify-center overflow-hidden px-6 text-center">
    <!-- soft cobalt ambient wash, never AI-purple -->
    <div aria-hidden="true" class="pointer-events-none absolute -top-32 left-1/2 h-[520px] w-[520px] -translate-x-1/2 rounded-full bg-accent/10 blur-3xl dark:bg-accent/15"></div>

    <div class="relative flex flex-col items-center">
      <span class="load-fade anim-float text-slate-900 dark:text-slate-100">
        <svg class="h-24 w-24 sm:h-28 sm:w-28" aria-hidden="true"><use href="#pl-logo" /></svg>
      </span>

      <span class="load-fade d1 mt-6 font-display text-sm font-semibold tracking-tight text-slate-500 dark:text-slate-400">
        Playground Labs
      </span>

      <h1 class="load-fade d2 mt-4 font-display text-4xl font-bold leading-[1.08] tracking-tight sm:text-5xl">
        Something fun is<br class="hidden sm:block" />
        <span class="text-accent">on the way.</span>
      </h1>

      <p class="load-fade d2 mt-5 max-w-[42ch] text-lg leading-relaxed text-slate-600 dark:text-slate-400">
        A small studio building our own apps. The site is almost ready.
      </p>

      <a href="mailto:hello@playgroundlabs.app"
         class="load-fade d3 mt-8 inline-flex items-center rounded-full bg-accent px-7 py-3.5 text-sm font-semibold text-white shadow-lg shadow-accent/20 transition-transform hover:bg-accent-ink hover:-translate-y-0.5 active:scale-[0.98]">
        Say hi
      </a>
    </div>

    <p class="load-fade d3 absolute bottom-8 text-sm text-slate-400 dark:text-slate-500">© 2026 Playground Labs</p>
  </main>
</body>
</html>
